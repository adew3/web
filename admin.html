<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Адмін-панель | TicketGo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="header">
    <a href="index.html" class="logo">
        <img src="images/logo2.png" alt="TicketGo" class="logo-img">
        <span>TicketGo</span>
    </a>
    <nav id="main-nav"></nav>
</header>

<section class="tickets-page admin-page">
    <h1>Адмін-панель маршрутів</h1>

    <div class="admin-panel">
        <div class="admin-form-card">
            <h2>Додати новий маршрут</h2>
            <form id="route-form">
                <div class="auth-form-group">
                    <label for="route-from">Звідки</label>
                    <input type="text" id="route-from" required>
                </div>
                <div class="auth-form-group">
                    <label for="route-to">Куди</label>
                    <input type="text" id="route-to" required>
                </div>
                <div class="auth-form-group">
                    <label for="route-date">Дата</label>
                    <input type="date" id="route-date" required>
                </div>
                <div class="auth-form-group">
                    <label for="route-time">Час</label>
                    <input type="time" id="route-time" required>
                </div>
                <div class="auth-form-group">
                    <label for="route-price">Ціна (₴)</label>
                    <input type="number" id="route-price" min="1" required>
                </div>
                <div class="auth-form-group">
                    <label for="route-transport">Транспорт</label>
                    <select id="route-transport" required>
                        <option value="bus">Автобус</option>
                        <option value="train">Потяг</option>
                        <option value="plane">Літак</option>
                    </select>
                </div>
                <button type="submit" class="auth-btn">Додати маршрут</button>
            </form>
        </div>

        <div class="admin-table-card">
            <h2>Список маршрутів</h2>
            <div id="route-list"></div>
        </div>
    </div>
</section>

<script src="js/common.js"></script>
<script src="js/script.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
