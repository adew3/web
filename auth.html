<!-- auth.html -->
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Авторизація | TicketGo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
    <section id="signup-section">
        <h2>Створити акаунт</h2>
        <form id="signup-form">
            <div class="auth-form-group">
                <label for="reg-name">Повне ім'я</label>
                <input type="text" id="reg-name" name="username" class="auth-input" placeholder="Іван Іванов" required>
            </div>
            <div class="auth-form-group">
                <label for="reg-email">Електронна пошта</label>
                <input type="email" id="reg-email" name="email" class="auth-input" placeholder="example@mail.com" required>
            </div>
            <button type="submit" class="auth-btn">Зареєструватися</button>
        </form>
        <p style="margin-top: 20px;">Вже маєте акаунт? <a href="#" onclick="toggleAuth()">Увійти</a></p>
    </section>

    <section id="signin-section" style="display: none;">
        <h2>Вхід у систему</h2>
        <form id="signin-form">
            <div class="auth-form-group">
                <label for="login-email">Електронна пошта</label>
                <input type="email" id="login-email" name="email" class="auth-input" placeholder="example@mail.com" required>
            </div>
            <button type="submit" class="auth-btn">Увійти</button>
        </form>
        <p style="margin-top: 20px;">Немає акаунту? <a href="#" onclick="toggleAuth()">Створити зараз</a></p>
        <p>admin@ticketgo.com</p>
        <P>user@gmail.com</P>
    </section>
</div>

    <script src="js/auth.js"></script>
</body>
</html>
