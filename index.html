<!DOCTYPE html>
<html lang="uk">
<head>

    <meta charset="UTF-8">
    <title>TicketGo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="header">
    <div class="logo">TicketGo</div>
    <nav>
        <a href="#">Головна</a>
        <a href="tickets.html">Квитки</a>
        <a href="#">Мої бронювання</a>
        <a href="#">Профіль</a>
    </nav>
</header>

<section class="search">
    <h1>Зручно бронюйте квитки онлайн</h1>
    <div class="search-box">
        <input type="text" placeholder="Звідки">
        <input type="text" placeholder="Куди">
        <input type="date">
        <button>Знайти квитки</button>
    </div>
</section>

<section class="popular">
    <h2>Популярні напрямки</h2>
    <div class="cards" id="cards-container"></div>
</section>

<section class="steps">
    <h2>Як працює TicketGo</h2>
    <div class="step-list">
        <div>1. Оберіть маршрут</div>
        <div>2. Забронюйте</div>
        <div>3. Отримайте квиток</div>
    </div>
</section>

<footer class="footer">
    <p>© 2026 TicketGo</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
