<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Квитки | TicketGo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="header">
    <a href="index.html" class="logo">
        <img src="images/logo2.png" alt="TicketGo" class="logo-img">
        <span>TicketGo</span>
    </a>
    <nav id="main-nav"></nav>
</header>

<section class="tickets-page">
    <h1>Доступні квитки</h1>

    <div class="controls-panel" style="margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap;">
        <!-- Пошук містом -->
        <input type="text" id="search-input" placeholder="Пошук за містом..." style="padding: 10px; flex: 1;">
        
        <!-- НОВЕ: Фільтр за датою -->
        <input type="date" id="date-filter" style="padding: 10px;">

        <!-- Фільтр за типом -->
        <select id="type-filter" style="padding: 10px;">
            <option value="all">Всі типи</option>
            <option value="bus">Автобус</option>
            <option value="train">Потяг</option>
            <option value="plane">Літак</option>
        </select>

        <!-- Сортування -->
        <select id="sort-select" style="padding: 10px;">
            <option value="price-asc">Ціна: від дешевих</option>
            <option value="price-desc">Ціна: від дорогих</option>
            <option value="date-asc">Спочатку найближчі</option>
        </select>
    </div>

    <div class="ticket-list" id="ticket-container"></div>
</section>

<script src="js/common.js"></script>
<script src="js/script.js"></script>
<script src="js/tickets.js"></script>
</body>
</html>
